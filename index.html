<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IronRep — Trainingsplan</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a; color: #e0e0e0;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 24px;
  }
  .card {
    max-width: 400px; width: 100%; text-align: center;
    background: #1a1a1a; border-radius: 20px; padding: 40px 24px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: #fff; }
  .sub { color: #888; font-size: 14px; margin-bottom: 28px; }
  .btn {
    display: inline-block; padding: 14px 32px;
    background: #c8e64e; color: #000; font-weight: 700; font-size: 16px;
    border-radius: 14px; text-decoration: none; transition: opacity 0.2s;
  }
  .btn:active { opacity: 0.7; }
  .hint { color: #666; font-size: 12px; margin-top: 20px; line-height: 1.5; }
  .plan-info { margin: 16px 0 24px; }
  .plan-name { font-size: 18px; font-weight: 600; color: #c8e64e; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">💪</div>
  <h1>IronRep Trainingsplan</h1>
  <div id="plan-details" class="plan-info" style="display:none">
    <div id="plan-name" class="plan-name"></div>
  </div>
  <p class="sub">Tippe unten, um den Plan in IronRep zu importieren.</p>
  <a id="open-btn" class="btn" href="#">In IronRep öffnen</a>
  <p class="hint">
    Du brauchst die IronRep App.<br>
    Falls sich nichts öffnet, ist die App noch nicht installiert.
  </p>
</div>
<script>
  const data = window.location.hash.slice(1);
  if (data) {
    const deepLink = 'ironrep://plan/' + data;
    document.getElementById('open-btn').href = deepLink;

    // Try to decode plan name for display
    try {
      const raw = atob(data.replace(/-/g,'+').replace(/_/g,'/'));
      const bytes = Uint8Array.from(raw, c => c.charCodeAt(0));
      const ds = new DecompressionStream('gzip');
      const writer = ds.writable.getWriter();
      writer.write(bytes);
      writer.close();
      new Response(ds.readable).text().then(json => {
        const plan = JSON.parse(json);
        if (plan.n) {
          document.getElementById('plan-name').textContent = plan.n;
          document.getElementById('plan-details').style.display = 'block';
        }
      }).catch(() => {});
    } catch(e) {}
  } else {
    document.getElementById('open-btn').style.display = 'none';
    document.querySelector('.sub').textContent = 'Kein Plan-Code gefunden.';
  }
</script>
</body>
</html>
